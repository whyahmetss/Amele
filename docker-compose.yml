version: '3.9'

services:
  bot:
    build: .
    container_name: ustago-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - ustago-network

  postgres:
    image: postgres:16-alpine
    container_name: ustago-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ustago_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ustago-network

  redis:
    image: redis:7-alpine
    container_name: ustago-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ustago-network

volumes:
  postgres_data:
  redis_data:

networks:
  ustago-network:
    driver: bridge
